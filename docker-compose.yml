version: "3.9"

services:
  backend:
    build: ./backend
    container_name: dermlens_backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ./backend:/app
      - model_cache:/app/models
      - db_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dermlens_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  model_cache:
  db_data:
